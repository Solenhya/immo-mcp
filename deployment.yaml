apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-immo-server
  labels:
    app: mcp-immo-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-immo-server
  template:
    metadata:
      labels:
        app: mcp-immo-server
    spec:
      containers:
        - name: mcp-immo-server
          image: mcp-immo-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /sse
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /sse
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-immo-server
  labels:
    app: mcp-immo-server
spec:
  selector:
    app: mcp-immo-server
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
